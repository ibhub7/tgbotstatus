<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Pro | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --accent: #10b981;
            --text: #f8fafc;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(22, 27, 44, 0.6);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 500px;
        }
        h1 { font-size: 42px; margin-bottom: 10px; letter-spacing: -2px; }
        span { color: var(--accent); }
        p { opacity: 0.7; line-height: 1.6; margin-bottom: 30px; }
        
        .btn {
            display: inline-block;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 700;
            transition: transform 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent);
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Monitor <span>Pro</span></h1>
        <p>
            Welcome to the Next-Gen Bot Monitoring Service. <br>
            Track uptime, get instant alerts, and manage your bots with a personal dashboard.
        </p>
        
        <a href="https://t.me/multi_purpose_nexus_tool_bot" class="btn">🚀 Get Started on Telegram</a>
        
        <div class="footer">
            © 2026 Infinity Monitor Bots • Z Edition
        </div>
    </div>
</body>
</html>
