<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stats Access</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1f1f1f, #0a0a0a);
            overflow: hidden;
        }

        /* glowing background */
        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: #0088cc;
            filter: blur(180px);
            opacity: 0.4;
            top: -100px;
            left: -100px;
        }

        body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: #00ffaa;
            filter: blur(150px);
            opacity: 0.3;
            bottom: -120px;
            right: -120px;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            width: 320px;
        }

        h3 {
            margin-bottom: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0 20px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #0088cc;
            box-shadow: 0 0 10px #0088cc55;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #0088cc, #00c6ff);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,136,204,0.4);
        }

        button:active {
            transform: scale(0.98);
        }

    </style>
</head>

<body>
    <div class="card">
        <h3>🔒 Protected Stats</h3>

        <form method="POST">
            <input type="password" name="key" placeholder="Enter Access Key" required>
            <button type="submit">Unlock</button>
        </form>
    </div>
</body>
</html>
