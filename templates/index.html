<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Pro | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --accent: #10b981; --text: #f8fafc; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .container { 
            text-align: center; padding: 40px; background: rgba(22, 27, 44, 0.6); 
            border-radius: 30px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 500px; position: relative;
        }

        /* VISUAL POLISH: Subtle Rotating Glow */
        .container::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 60%);
            animation: rotateGlow 15s linear infinite; z-index: -1;
        }
        @keyframes rotateGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 { font-size: 42px; margin-bottom: 10px; letter-spacing: -2px; }
        span { color: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-val { display: block; font-size: 24px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Monitor <span>Pro</span></h1>
        <p>Next-Gen Bot Monitoring Service.</p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-val" id="total-bots">...</span>
                <span class="stat-label">Bots Tracked</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="online-bots">...</span>
                <span class="stat-label">Online</span>
            </div>
        </div>
    </div>

    <script>
        // Use the key from the URL automatically
        const urlParams = new URLSearchParams(window.location.search);
        const webKey = urlParams.get('key');

        async function updateStats() {
            try {
                const response = await fetch(`/api/stats?key=${webKey}`);
                const data = await response.json();
                document.getElementById('total-bots').innerText = data.total_bots;
                document.getElementById('online-bots').innerText = data.online_bots;
            } catch (e) { console.error("Access Denied or Connection Failed"); }
        }
        setInterval(updateStats, 10000);
        updateStats();
    </script>
</body>
</html>
