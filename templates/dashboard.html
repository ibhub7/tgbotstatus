<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Dashboard Pro | {{ user_id }}</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0b0f1a; 
            --card: #161b2c; 
            --neon-g: #10b981; 
            --neon-r: #f43f5e; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 10px; 
            text-align: center; 
        }
        .header { 
            margin-bottom: 30px; 
            padding: 25px; 
            background: linear-gradient(180deg, #1e293b 0%, var(--bg) 100%);
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .header h1 { margin: 0; font-size: 28px; letter-spacing: -1px; }
        
        /* Global Refresh Timer Style */
        .refresh-box {
            margin-top: 15px;
            font-size: 14px;
            color: var(--neon-g);
            background: rgba(16, 185, 129, 0.1);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--neon-g);
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 10px;
        }
        .bot-card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.4); 
            border: 1px solid #2d3748;
            position: relative;
            transition: all 0.3s ease;
        }
        
        /* Neon Border Logic */
        .bot-card.online-border { border-top: 4px solid var(--neon-g); }
        .bot-card.offline-border { border-top: 4px solid var(--neon-r); }

        .bot-link {
            color: var(--text-main); text-decoration: none; font-size: 20px; font-weight: 700;
            display: block; margin-bottom: 15px;
        }

        .status-badge {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 20px; border-radius: 30px; font-size: 15px; font-weight: 600;
            background: rgba(15, 23, 42, 0.8); border: 1px solid #334155;
        }
        
        /* The Dots */
        .dot { height: 10px; width: 10px; border-radius: 50%; margin-right: 10px; }
        .dot-green { background: var(--neon-g); box-shadow: 0 0 12px var(--neon-g); animation: pulse 2s infinite; }
        .dot-red { background: var(--neon-r); box-shadow: 0 0 12px var(--neon-r); }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .empty-msg { grid-column: 1/-1; padding: 50px; color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌐 Monitor <span style="color:var(--neon-g)">Dashboard</span></h1>
        <p style="color:var(--text-dim); margin-top:10px;">
            📅 ᴅᴀᴛᴇ: <b>{{ date }}</b> | ⏰ ʟᴀꜱᴛ ꜱʏɴᴄ: <b style="color:white">{{ time }}</b>
        </p>
        <div class="refresh-box">
            🔄 ᴀᴜᴛᴏ-ʀᴇꜰʀᴇꜱʜ ɪɴ: <span id="global-timer">60:00</span>
        </div>
        <p style="font-size: 11px; opacity: 0.5; margin-top: 10px;">User ID: {{ user_id }}</p>
    </div>

    <div class="grid">
        {% if bots %}
            {% for bot in bots %}
            <div class="bot-card {{ 'online-border' if 'ᴏɴʟɪɴᴇ' in bot.status else 'offline-border' }}">
                <a href="https://t.me/{{ bot.username }}" target="_blank" class="bot-link">
                    🤖 {{ bot.name }}
                </a>
                
                <div class="status-badge">
                    <span class="dot {{ 'dot-green' if 'ᴏɴʟɪɴᴇ' in bot.status else 'dot-red' }}"></span>
                    <span style="color: {{ '#10b981' if 'ᴏɴʟɪɴᴇ' in bot.status else '#f43f5e' }}">
                        {{ bot.status }}
                    </span>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty-msg">
                <h3>🚫 No Bots Found</h3>
                <p>Telegram par <code>/addbot</code> use karke monitor shuru karein.</p>
            </div>
        {% endif %}
    </div>

    <script>
        // Start 60 Minute Countdown (3600 seconds)
        let timeLeft = 3600; 
        const timerElement = document.getElementById('global-timer');

        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                location.reload();
            } else {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                // Format as MM:SS
                timerElement.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                timeLeft--;
            }
        }, 1000);
    </script>
</body>
</html>
