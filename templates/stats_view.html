<!DOCTYPE html>
<html>
<head>
    <title>Bot Statistics</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .stat-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .stat-card { background: #1e1e1e; padding: 25px; border-radius: 15px; min-width: 160px; border-bottom: 5px solid #0088cc; }
        .val { font-size: 2.5rem; font-weight: bold; display: block; margin-bottom: 5px; }
        .label { color: #aaa; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>
    <h1>Network Overview</h1>
    <div class="stat-container">
        <div class="stat-card">
            <span class="val">{{ total }}</span>
            <span class="label">Total Bots</span>
        </div>
        <div class="stat-card" style="border-color: #28a745;">
            <span class="val">{{ online }}</span>
            <span class="label">Online</span>
        </div>
        <div class="stat-card" style="border-color: #dc3545;">
            <span class="val">{{ offline }}</span>
            <span class="label">Offline</span>
        </div>
    </div>
    <br>
    <a href="/stats" style="color: #888; text-decoration: none;">← Logout</a>
</body>
</html>
