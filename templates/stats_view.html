<!DOCTYPE html>
<html>
<head>
    <title>Bot Statistics</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: #050505;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        h1 {
            margin-top: 40px;
            z-index: 2;
            position: relative;
            color: #9fefff;
        }

        .stat-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 40px;
            position: relative;
            z-index: 2;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            min-width: 170px;
            border: 1px solid rgba(0,200,255,0.2);
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,200,255,0.2);
        }

        .val {
            font-size: 2.8rem;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #00c8ff;
        }

        .label {
            color: #aaa;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        a {
            position: relative;
            z-index: 2;
            color: #888;
            text-decoration: none;
        }

        a:hover {
            color: #00c8ff;
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>📊 Network Overview</h1>

<div class="stat-container">
    <div class="stat-card">
        <span class="val">{{ total }}</span>
        <span class="label">Total Bots</span>
    </div>

    <div class="stat-card">
        <span class="val" style="color:#28ff88;">{{ online }}</span>
        <span class="label">Online</span>
    </div>

    <div class="stat-card">
        <span class="val" style="color:#ff4d4d;">{{ offline }}</span>
        <span class="label">Offline</span>
    </div>
</div>

<br><br>
<a href="/stats">← Logout</a>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
const count = 90;

// create nodes
for (let i = 0; i < count; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.8,
        vy: (Math.random() - 0.5) * 0.8
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // draw connections
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 130) {
                ctx.strokeStyle = "rgba(0,200,255," + (1 - dist/130) + ")";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }

    // draw nodes
    particles.forEach(p => {
        ctx.fillStyle = "#00c8ff";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();

        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    });

    requestAnimationFrame(draw);
}

draw();

// resize
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
